{% extends "base.html" %}
{% load static %}

{% block title %}Email Verified - MfalmeBits{% endblock %}

{% block content %}
<style>
  .verify-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #37063b 0%, #1a021c 100%);
    padding: 2rem;
  }
  
  .verify-card {
    max-width: 500px;
    width: 100%;
    background: rgba(255,255,255,.03);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 24px;
    padding: 48px 40px;
    backdrop-filter: blur(24px);
    text-align: center;
    animation: fadeUp 0.6s ease both;
  }
  
  @keyframes fadeUp {
    from {
      opacity: 0;
      transform: translateY(30px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
  
  .verify-icon {
    width: 80px;
    height: 80px;
    background: linear-gradient(135deg, #00c853, #00e676);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
  }
  
  .verify-icon svg {
    width: 40px;
    height: 40px;
  }
  
  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 1.8rem;
    font-weight: 800;
    color: #fff;
    margin-bottom: 16px;
  }
  
  .message {
    color: rgba(255,255,255,.7);
    font-size: 1rem;
    line-height: 1.6;
    margin-bottom: 32px;
  }
  
  .btn {
    display: inline-block;
    padding: 12px 32px;
    background: linear-gradient(135deg, #ffa032, #ff6b32);
    border-radius: 12px;
    color: #fff;
    text-decoration: none;
    font-weight: 600;
    transition: transform 0.2s;
  }
  
  .btn:hover {
    transform: translateY(-2px);
  }
</style>

<div class="verify-wrap">
  <div class="verify-card">
    <div class="verify-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
        <path d="M20 6L9 17L4 12" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    
    <h1>Email Verified! ✅</h1>
    
    <p class="message">
      Your email address has been successfully verified. You can now log in to your account.
    </p>
    
    <a href="{% url 'accounts:login' %}" class="btn">Log In Now</a>
  </div>
</div>
{% endblock %}
