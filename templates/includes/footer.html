{% load static %}

<!-- Minimal Footer with Glassmorphism -->
<footer class="footer-minimal">
    <div class="container">
        <div class="footer-content">
            <!-- Brand & Social - Compact -->
            <div class="footer-brand">
                <a href="{% url 'home:home' %}" class="footer-logo">
                    <span class="gradient-text">Mfalme<span class="text-primary">Bits</span></span>
                </a>
                <div class="social-links-minimal">
                    <a href="#" class="social-link" target="_blank" rel="noopener" aria-label="Facebook">
                        <i class="fab fa-facebook-f"></i>
                    </a>
                    <a href="#" class="social-link" target="_blank" rel="noopener" aria-label="Twitter">
                        <i class="fab fa-twitter"></i>
                    </a>
                    <a href="#" class="social-link" target="_blank" rel="noopener" aria-label="Instagram">
                        <i class="fab fa-instagram"></i>
                    </a>
                    <a href="#" class="social-link" target="_blank" rel="noopener" aria-label="YouTube">
                        <i class="fab fa-youtube"></i>
                    </a>
                </div>
            </div>

            <!-- Newsletter - Compact -->
            <div class="footer-newsletter">
                <form action="{% url 'newsletter:subscribe' %}" method="post" class="newsletter-form-minimal">
                    {% csrf_token %}
                    <div class="input-group-minimal">
                        <input type="email" name="email" placeholder="Email for updates" required autocomplete="email">
                        <button type="submit" aria-label="Subscribe">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </form>
            </div>

            <!-- Quick Links - Horizontal -->
            <div class="footer-links-minimal">
                <a href="{% url 'about:index' %}">About</a>
                <span class="separator">•</span>
                <a href="{% url 'blog:index' %}">Blog</a>
                <span class="separator">•</span>
                <a href="{% url 'contact:index' %}">Contact</a>
                <span class="separator">•</span>
                <a href="{% url 'home:privacy_policy' %}">Privacy</a>
                <span class="separator">•</span>
                <a href="{% url 'home:terms_of_service' %}">Terms</a>
            </div>

            <!-- Copyright - Compact -->
            <div class="footer-copyright">
                <p>&copy; {% now "Y" %} MfalmeBits. All rights reserved.</p>
            </div>
        </div>
    </div>
</footer>

<!-- Minimal Footer CSS - Integrated with Design System -->
<style>
    .footer-minimal {
        background: rgba(6, 6, 10, 0.85);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        padding: 2rem 0;
        border-top: 1px solid var(--glass-border, rgba(255,255,255,0.08));
        position: relative;
        overflow: hidden;
        margin-top: auto;
    }

    /* Dark mode compatibility */
    [data-theme="light"] .footer-minimal {
        background: rgba(240, 235, 224, 0.92);
        border-top-color: rgba(0, 0, 0, 0.08);
    }

    .footer-minimal::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--terra-light, #c13a10), transparent);
        opacity: 0.6;
    }

    .footer-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.2rem;
        text-align: center;
    }

    /* Brand Section */
    .footer-brand {
        display: flex;
        align-items: center;
        gap: 1.5rem;
        flex-wrap: wrap;
        justify-content: center;
    }

    .footer-logo {
        font-size: 1.35rem;
        font-weight: 700;
        text-decoration: none;
        font-family: var(--ff-head, 'Syne', system-ui, sans-serif);
    }

    .gradient-text {
        background: linear-gradient(135deg, #fff 0%, var(--ochre-light, #e8aa46) 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
    }

    [data-theme="light"] .gradient-text {
        background: linear-gradient(135deg, var(--terra-dark, #9a2e0b) 0%, var(--ochre, #d4922a) 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
    }

    .text-primary {
        color: var(--terra-light, #c13a10) !important;
    }

    /* Social Links */
    .social-links-minimal {
        display: flex;
        gap: 0.8rem;
    }

    .social-link {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(8px);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--txt-70, rgba(255,255,255,0.7));
        text-decoration: none;
        transition: all 0.3s var(--ease, cubic-bezier(0.22, 1, 0.36, 1));
        border: 1px solid var(--glass-border, rgba(255,255,255,0.08));
    }

    [data-theme="light"] .social-link {
        background: rgba(0, 0, 0, 0.04);
        border-color: rgba(0, 0, 0, 0.1);
        color: var(--terra-dark, #9a2e0b);
    }

    .social-link:hover {
        background: linear-gradient(135deg, var(--terra-light, #c13a10), var(--ochre, #d4922a));
        color: white;
        transform: translateY(-3px);
        border-color: transparent;
    }

    /* Newsletter Form */
    .newsletter-form-minimal {
        display: inline-block;
    }

    .input-group-minimal {
        display: flex;
        align-items: center;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid var(--glass-border, rgba(255,255,255,0.1));
        border-radius: 999px;
        padding: 0.2rem 0.2rem 0.2rem 1.2rem;
        backdrop-filter: blur(8px);
        transition: all 0.3s ease;
        width: 300px;
        max-width: 100%;
    }

    [data-theme="light"] .input-group-minimal {
        background: rgba(0, 0, 0, 0.03);
        border-color: rgba(0, 0, 0, 0.1);
    }

    .input-group-minimal:focus-within {
        border-color: var(--terra-light, #c13a10);
        box-shadow: 0 0 0 3px rgba(193, 58, 16, 0.15);
    }

    .input-group-minimal input {
        flex: 1;
        background: transparent;
        border: none;
        padding: 0.6rem 0;
        color: var(--txt, #ffffff);
        font-size: 0.9rem;
        outline: none;
    }

    [data-theme="light"] .input-group-minimal input {
        color: var(--ink, #06060a);
    }

    .input-group-minimal input::placeholder {
        color: var(--txt-50, rgba(255,255,255,0.55));
    }

    [data-theme="light"] .input-group-minimal input::placeholder {
        color: rgba(0, 0, 0, 0.5);
    }

    .input-group-minimal button {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--terra-light, #c13a10), var(--terra-dark, #9a2e0b));
        border: none;
        color: white;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .input-group-minimal button:hover {
        transform: scale(1.08);
        box-shadow: 0 4px 12px rgba(193, 58, 16, 0.4);
    }

    /* Quick Links */
    .footer-links-minimal {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        flex-wrap: wrap;
        justify-content: center;
    }

    .footer-links-minimal a {
        color: var(--txt-60, rgba(255,255,255,0.65));
        text-decoration: none;
        font-size: 0.88rem;
        font-weight: 500;
        transition: all 0.2s ease;
    }

    [data-theme="light"] .footer-links-minimal a {
        color: rgba(0, 0, 0, 0.6);
    }

    .footer-links-minimal a:hover {
        color: var(--terra-light, #c13a10);
        text-decoration: underline;
        text-underline-offset: 3px;
    }

    .separator {
        color: var(--txt-30, rgba(255,255,255,0.35));
        font-size: 0.7rem;
    }

    [data-theme="light"] .separator {
        color: rgba(0, 0, 0, 0.3);
    }

    /* Copyright */
    .footer-copyright p {
        color: var(--txt-50, rgba(255,255,255,0.55));
        font-size: 0.8rem;
        margin: 0;
    }

    [data-theme="light"] .footer-copyright p {
        color: rgba(0, 0, 0, 0.5);
    }

    /* Responsive */
    @media (max-width: 768px) {
        .footer-content {
            gap: 1.25rem;
        }

        .footer-brand {
            flex-direction: column;
            gap: 1rem;
        }

        .social-links-minimal {
            justify-content: center;
        }

        .input-group-minimal {
            width: 280px;
        }

        .footer-links-minimal {
            gap: 0.5rem;
        }
        
        .footer-links-minimal a {
            font-size: 0.8rem;
        }
    }

    @media (max-width: 480px) {
        .footer-minimal {
            padding: 1.5rem 0;
        }

        .footer-links-minimal {
            gap: 0.4rem;
        }

        .separator {
            display: none;
        }

        .footer-links-minimal a {
            font-size: 0.75rem;
            padding: 0 0.25rem;
        }
    }

    /* Animation */
    .footer-minimal {
        animation: footerFadeInUp 0.8s var(--ease, cubic-bezier(0.22, 1, 0.36, 1)) forwards;
    }

    @keyframes footerFadeInUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>
