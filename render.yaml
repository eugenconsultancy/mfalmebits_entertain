# render.yaml - Render Infrastructure as Code for MfalmeBits
services:
  # Web Service (Django Application)
  - type: web
    name: mfalme-bits
    runtime: python
    repo: https://github.com/eugenconsultancy/mfalmebits_entertain.git
    plan: free
    region: oregon
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
    startCommand: |
      python manage.py migrate --noinput
      gunicorn core.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --threads 2 --timeout 120
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mfalme-bits-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_SETTINGS_MODULE
        value: core.settings.render
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: WEB_CONCURRENCY
        value: 2
      - key: RENDER
        value: true

  # PostgreSQL Database
  - type: pgsql
    name: mfalme-bits-db
    plan: free
    ipAllowList: []  # Allow all connections (restricted internally)

  # Redis Cache (Optional - uncomment if you need caching)
  # - type: redis
  #   name: mfalme-bits-redis
  #   plan: free
  #   ipAllowList: []