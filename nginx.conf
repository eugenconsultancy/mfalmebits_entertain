# /etc/nginx/sites-available/mfalmebits
# ─────────────────────────────────────────────────────────────────────
# Nginx configuration for MfalmeBits on a 2 GB VPS.
# Domain: mfalmebits.africa
#
# What this config does:
#   • Serves static files directly from disk (bypasses Gunicorn entirely)
#   • Serves media files from disk with long-lived browser cache headers
#   • Enables Gzip compression for HTML/CSS/JS/JSON/SVG/XML
#   • Redirects HTTP → HTTPS
#   • Proxies everything else to Gunicorn via Unix socket
#   • Adds security headers for M-Pesa/Stripe payment security
#   • Optimised for low-RAM by limiting worker_processes and buffers
#
# How to use:
#   sudo ln -s /etc/nginx/sites-available/mfalmebits \
#              /etc/nginx/sites-enabled/mfalmebits
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL certificate:
#   sudo certbot --nginx -d mfalmebits.africa -d www.mfalmebits.africa
# ─────────────────────────────────────────────────────────────────────

# Low-RAM tuning — set in /etc/nginx/nginx.conf instead of here,
# but documented for reference:
#   worker_processes auto;          # Matches CPU cores
#   worker_connections 512;         # Per worker (1024 default is too high for 2 GB)
#   keepalive_timeout 30;           # Release idle connections sooner

# ── Gunicorn upstream — Unix socket for better performance ────────────
upstream gunicorn {
    # Match the socket path in your Gunicorn config
    # Unix socket is faster and more secure than TCP on localhost
    server unix:/run/gunicorn.sock fail_timeout=0;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name mfalmebits.africa www.mfalmebits.africa;

    # Let Certbot manage this for ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main server ─────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mfalmebits.africa www.mfalmebits.africa;

    # ── SSL ───────────────────────────────────────────────────────────
    # Update these paths after running Certbot
    ssl_certificate     /etc/letsencrypt/live/mfalmebits.africa/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mfalmebits.africa/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Gzip ─────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   5;          # 5 is a good speed/size trade-off
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_min_length   256;        # Don't compress tiny responses
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/woff
        font/woff2;

    # ── Client & proxy buffers (optimized for 2 GB RAM) ───────────────
    client_max_body_size       20M;     # Allow file uploads up to 20 MB
    client_body_buffer_size    128k;
    proxy_buffer_size          128k;    # Increased for large headers
    proxy_buffers              4 256k;  # Adjusted for 2GB RAM
    proxy_busy_buffers_size    256k;
    proxy_read_timeout         120s;
    proxy_connect_timeout      10s;

    # ── Security headers for M-Pesa/Stripe ────────────────────────────
    add_header X-Frame-Options            "SAMEORIGIN"                   always;
    add_header X-Content-Type-Options     "nosniff"                      always;
    add_header X-XSS-Protection           "1; mode=block"                always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "geolocation=(), microphone=()" always;
    # HSTS - Enable only after confirming HTTPS works correctly
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains" always;
    
    # Content Security Policy for M-Pesa/Stripe
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://js.stripe.com https://api.safaricom.co.ke; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self' https://api.safaricom.co.ke; frame-src https://js.stripe.com;" always;

    # ── Static files — served directly by Nginx ───────────────────────
    # Update the path to match your deployment directory
    location /static/ {
        alias /home/ubuntu/mfalme_entertain/staticfiles/;
        
        # Tell browsers to cache static assets for 1 year
        expires           30d;
        add_header        Cache-Control "public, no-transform";
        access_log        off;
        
        # Serve pre-compressed .gz files if available
        gzip_static       on;
    }

    # ── Media files — user uploads ────────────────────────────────────
    # Update the path to match your deployment directory
    location /media/ {
        alias /home/ubuntu/mfalme_entertain/media/;
        
        expires    30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # ── M-Pesa Callback endpoint (no timeout for callbacks) ───────────
    location /api/mpesa/ {
        proxy_pass              http://gunicorn;
        proxy_http_version      1.1;
        proxy_set_header        Host               $host;
        proxy_set_header        X-Real-IP          $remote_addr;
        proxy_set_header        X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto  $scheme;
        
        # Longer timeout for M-Pesa callbacks
        proxy_read_timeout      120s;
        proxy_connect_timeout   30s;
    }

    # ── robots.txt & favicon — short-circuit ─────────────────────────
    location = /robots.txt {
        alias /home/ubuntu/mfalme_entertain/staticfiles/robots.txt;
        access_log off;
        log_not_found off;
    }

    location = /favicon.ico {
        alias /home/ubuntu/mfalme_entertain/staticfiles/images/favicon.ico;
        access_log off;
        log_not_found off;
    }

    # ── Health check — allow load-balancer probes without logging ─────
    location = /health/ {
        proxy_pass              http://gunicorn;
        proxy_set_header        Host $host;
        proxy_set_header        X-Forwarded-Proto $scheme;
        access_log              off;
    }

    # ── Everything else → Gunicorn ────────────────────────────────────
    location / {
        proxy_pass              http://gunicorn;
        proxy_http_version      1.1;
        proxy_set_header        Host               $host;
        proxy_set_header        X-Real-IP          $remote_addr;
        proxy_set_header        X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto  $scheme;
        proxy_set_header        X-Forwarded-Host   $host;
        proxy_set_header        Connection         "";
        proxy_redirect          off;
        
        # Buffer settings for 2GB RAM
        proxy_buffer_size       128k;
        proxy_buffers           4 256k;
        proxy_busy_buffers_size 256k;
        
        # Timeout settings for external API calls
        proxy_connect_timeout   75s;
        proxy_send_timeout      75s;
        proxy_read_timeout      75s;
    }

    # ── Error pages ───────────────────────────────────────────────────
    error_page 404 /404.html;
    error_page 500 502 503 504 /500.html;
    
    location = /404.html {
        root /home/ubuntu/mfalme_entertain/templates/errors/;
        internal;
    }
    
    location = /500.html {
        root /home/ubuntu/mfalme_entertain/templates/errors/;
        internal;
    }
}