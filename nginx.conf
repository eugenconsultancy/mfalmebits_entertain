# /etc/nginx/sites-available/mfalmebits
# ─────────────────────────────────────────────────────────────────────
# Nginx configuration for MfalmeBits on a 2 GB VPS.
#
# What this config does:
#   • Serves static files directly from disk (bypasses Gunicorn entirely)
#   • Serves media files from disk with long-lived browser cache headers
#   • Enables Gzip compression for HTML/CSS/JS/JSON/SVG/XML
#   • Redirects HTTP → HTTPS
#   • Proxies everything else to Gunicorn on 127.0.0.1:8000
#   • Adds security headers (X-Frame-Options, CSP, HSTS)
#   • Optimised for low-RAM by limiting worker_processes and buffers
#
# How to use:
#   sudo ln -s /etc/nginx/sites-available/mfalmebits \
#              /etc/nginx/sites-enabled/mfalmebits
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL certificate:
#   sudo certbot --nginx -d mfalmebits.com -d www.mfalmebits.com
# ─────────────────────────────────────────────────────────────────────

# Low-RAM tuning — set in /etc/nginx/nginx.conf instead of here,
# but documented for reference:
#   worker_processes auto;          # Matches CPU cores
#   worker_connections 512;         # Per worker (1024 default is too high for 2 GB)
#   keepalive_timeout 30;           # Release idle connections sooner

upstream gunicorn {
    server 127.0.0.1:8000 fail_timeout=0;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name mfalmebits.com www.mfalmebits.com;

    # Let Certbot manage this for ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main server ─────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mfalmebits.com www.mfalmebits.com;

    # ── SSL ───────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/mfalmebits.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mfalmebits.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Gzip ─────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   5;          # 5 is a good speed/size trade-off
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_min_length   256;        # Don't compress tiny responses
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/woff
        font/woff2;

    # ── Client & proxy buffers (tuned for 2 GB RAM) ───────────────────
    client_max_body_size       20M;     # Allow file uploads up to 20 MB
    client_body_buffer_size    128k;
    proxy_buffers              8 16k;
    proxy_buffer_size          32k;
    proxy_read_timeout         120s;
    proxy_connect_timeout      10s;

    # ── Security headers ──────────────────────────────────────────────
    add_header X-Frame-Options            "DENY"                         always;
    add_header X-Content-Type-Options     "nosniff"                      always;
    add_header X-XSS-Protection           "1; mode=block"                always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "geolocation=(), microphone=()" always;
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains; preload" always;
    # Adjust CSP to match your CDN / inline script usage:
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self'; frame-src https://js.stripe.com;" always;

    # ── Static files — served directly by Nginx ───────────────────────
    # Files land here after `python manage.py collectstatic`
    location /static/ {
        alias /path/to/mfalmebits/staticfiles/;  # ← Update this path

        # Tell browsers to cache static assets for 1 year.
        # WhiteNoise CompressedManifest adds a hash to filenames,
        # so cache-busting is automatic on deployment.
        expires           1y;
        add_header        Cache-Control "public, immutable";
        access_log        off;

        # Serve pre-compressed .gz files if available (WhiteNoise creates them)
        gzip_static       on;
    }

    # ── Media files — user uploads ────────────────────────────────────
    location /media/ {
        alias /path/to/mfalmebits/media/;        # ← Update this path

        expires    7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── robots.txt & favicon — short-circuit ─────────────────────────
    location = /robots.txt {
        alias /path/to/mfalmebits/staticfiles/robots.txt;
        access_log off;
        log_not_found off;
    }

    location = /favicon.ico {
        alias /path/to/mfalmebits/staticfiles/images/favicon.ico;
        access_log off;
        log_not_found off;
    }

    # ── Health check — allow load-balancer probes without logging ─────
    location = /health/ {
        proxy_pass         http://gunicorn;
        proxy_set_header   Host $host;
        access_log         off;
    }

    # ── Everything else → Gunicorn ────────────────────────────────────
    location / {
        proxy_pass              http://gunicorn;
        proxy_http_version      1.1;
        proxy_set_header        Host               $host;
        proxy_set_header        X-Real-IP          $remote_addr;
        proxy_set_header        X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto  $scheme;
        proxy_set_header        X-Forwarded-Host   $host;
        proxy_set_header        Connection         "";
        proxy_redirect          off;

        # Required for CSRF when behind a proxy:
        # This header is read by Django's SECURE_PROXY_SSL_HEADER setting.
        proxy_set_header        X-Forwarded-Proto  https;
    }

    # ── Error pages ───────────────────────────────────────────────────
    error_page 404 /404.html;
    error_page 500 502 503 504 /500.html;
}